<!DOCTYPE html>
<html lang="en" class="no-js">
  <head>
    <meta charset="UTF-8" />

    <meta name="theme-color" content="#14110f" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Google Consent Mode v2 defaults (set BEFORE GA loads) -->
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag('consent', 'default', {
        ad_storage: 'denied',
        ad_user_data: 'denied',
        ad_personalization: 'denied',
        analytics_storage: 'denied',
        functionality_storage: 'granted',
        security_storage: 'granted',
        wait_for_update: 500,
      });
      // Restore previously granted consent on repeat visits
      try {
        if (localStorage.getItem('gjc_consent') === 'granted') {
          gtag('consent', 'update', {
            ad_storage: 'granted',
            ad_user_data: 'granted',
            ad_personalization: 'granted',
            analytics_storage: 'granted',
          });
        }
      } catch (e) {}
    </script>

    <!-- GOOGLE TAG (GTAG.JS) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-4J046JXWVC"></script>
    <script>
      gtag('js', new Date());
      gtag('config', 'G-4J046JXWVC', { anonymize_ip: true });
    </script>

    <!--ssr-head-->
  </head>

    <div id="root"><!--ssr-outlet--></div>
