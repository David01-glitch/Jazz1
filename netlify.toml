[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Each route is pre-rendered to its own index.html, so no catch-all rewrite is
# needed. Netlify automatically serves dist/404.html for unmatched paths.

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
